services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: llmadmin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: llmgateway
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmadmin -d llmgateway"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./internal/db/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build: .
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      APP_PORT: "8080"
      POSTGRES_DSN: postgres://llmadmin:${POSTGRES_PASSWORD}@postgres:5432/llmgateway?sslmode=disable
      REDIS_ADDR: redis:6379
      MOCK_MODE: "false"
      ADMIN_API_KEY: ${ADMIN_API_KEY:-admin-dev-key}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
